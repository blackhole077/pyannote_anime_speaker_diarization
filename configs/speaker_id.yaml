embedder:
  model: pyannote/embedding # must match the model used in enroll_characters
selection:
  min_clip_seconds: 1.5
  target_seconds_per_char: 25.0
scoring:
  snr_knee_db: 20.0
gate:
  sim: 0.40 # Minimum best-match cosine similarity to assign a cluster to its best-matching character.
  margin: 0.05 # Minimum gap between best and second-best similarity required to commit to the best match.
